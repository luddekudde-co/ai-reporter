<nav class="c-navbar">
  <a class="c-navbar__brand" routerLink="/">AI-Reporter</a>

  <div class="c-navbar__links">
    <a
      class="c-navbar__link"
      routerLink="/feed"
      routerLinkActive="c-navbar__link--is-active"
      >Feed</a
    >
    <a
      class="c-navbar__link"
      routerLink="/digest"
      routerLinkActive="c-navbar__link--is-active"
      >News Digest</a
    >
  </div>

  <div class="c-navbar__actions">
    <button class="c-navbar__sign-in" (click)="modal('signIn')">Sign In</button>
    <button class="c-navbar__sign-up" (click)="modal('signUp')">Sign Up</button>
  </div>

  <app-modal
    title="Sign in"
    [isOpen]="signInModalOpen()"
    (closed)="signInModalOpen.set(false)"
  >
    <app-input
      placeholder="Enter your email"
      type="email"
      [(value)]="emailValue"
    ></app-input>
    <app-input
      placeholder="Enter your password"
      type="password"
      [(value)]="passwordValue"
    ></app-input>
    <button (click)="signIn(emailValue, passwordValue)">Sign in</button>
  </app-modal>

  <app-modal
    title="Sign up"
    [isOpen]="signUpModalOpen()"
    (closed)="signUpModalOpen.set(false)"
  >
    <app-input
      [(value)]="emailValue"
      placeholder="Enter your email"
      type="email"
    ></app-input>
    <app-input
      [(value)]="passwordValue"
      placeholder="Enter your password"
      type="password"
    ></app-input>
    <button (click)="signUp(emailValue, passwordValue)">Sign up</button>
  </app-modal>

  <button
    type="button"
    class="c-navbar__hamburger"
    (click)="toggleMenu()"
    [attr.aria-expanded]="menuOpen()"
    aria-label="Toggle navigation"
  >
    {{ menuOpen() ? "✕" : "☰" }}
  </button>
</nav>

@if (menuOpen()) {
  <div class="c-navbar__mobile-menu">
    <a
      class="c-navbar__mobile-link"
      routerLink="/feed"
      routerLinkActive="c-navbar__mobile-link--is-active"
      (click)="closeMenu()"
      >Feed</a
    >
    <a
      class="c-navbar__mobile-link"
      routerLink="/digest"
      routerLinkActive="c-navbar__mobile-link--is-active"
      (click)="closeMenu()"
      >News Digest</a
    >
    <a class="c-navbar__mobile-link c-navbar__mobile-link--is-disabled"
      >Sign In</a
    >
  </div>
}
